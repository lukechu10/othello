name: Deploy to Github Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: |
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: install trunk
        run: >
          wget -qO-
          https://github.com/thedodd/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz
          | tar -xzf- && sudo mv trunk /usr/bin/

      - name: build
        run: cd othello-gui && trunk build --release --public-url /othello/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: othello-gui/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployments.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
